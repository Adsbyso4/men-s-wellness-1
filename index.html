<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amasho | Sasta aur Sabse Accha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .flipkart-blue { background-color: #2874f0; }
        .flipkart-orange { background-color: #fb641b; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <header class="flipkart-blue text-white sticky top-0 z-50 py-3 shadow-md">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <div class="text-2xl font-bold italic">Amasho</div>
            <button onclick="document.getElementById('authModal').classList.remove('hidden')" class="bg-white text-[#2874f0] px-6 py-1 font-bold rounded-sm text-sm">Login</button>
        </div>
    </header>

    <main class="container mx-auto p-2">
        <div class="bg-white rounded-sm shadow-sm overflow-hidden">
            <div class="p-4 flex justify-center border-b">
                <img src="https://i.postimg.cc/mD8X73N3/piggy-bank.jpg" class="h-64 object-contain" alt="Wooden Piggy Bank">
            </div>

            <div class="p-4">
                <h1 class="text-md text-gray-800 leading-tight">50000 to 120000 saving Money gulak medium quality Wooden Money Bank for Kids</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="bg-green-700 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-sm">4.1 ★</span>
                    <span class="text-gray-400 text-xs font-bold">36,613 Ratings</span>
                </div>

                <div class="mt-2 flex items-baseline gap-2">
                    <span class="text-2xl font-bold text-gray-900">₹100</span>
                    <span class="text-gray-500 line-through text-sm">₹599</span>
                    <span class="text-green-600 font-bold text-sm">83% off</span>
                </div>
                <p class="text-xs text-green-600 font-bold mt-1">Special Offer: Free Delivery</p>

                <div class="mt-4 border-t pt-4">
                    <h2 class="font-bold text-sm mb-2">Product Highlights</h2>
                    <ul class="text-xs text-gray-700 space-y-1">
                        <li><span class="text-gray-400">Material:</span> Wood</li>
                        <li><span class="text-gray-400">Dimensions:</span> 13x18 cm</li>
                        <li><span class="text-gray-400">Type:</span> Handicraft Piggy Bank</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 h-14 flex bg-white border-t z-50">
        <button onclick="openCheckout()" class="w-1/2 bg-white text-black font-bold uppercase text-sm">Add to Cart</button>
        <button onclick="openCheckout()" class="w-1/2 flipkart-orange text-white font-bold uppercase text-sm">Buy Now</button>
    </div>

    <div id="checkoutModal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-[100] flex items-end">
        <div class="bg-white w-full rounded-t-xl p-6 animate-slide-up">
            <h2 class="font-bold border-b pb-2 mb-4">Delivery Address</h2>
            <form id="orderForm" class="space-y-3">
                <input type="text" id="custName" placeholder="Full Name" required class="w-full border p-2 text-sm rounded">
                <textarea id="custAddr" placeholder="Address with Pincode" required class="w-full border p-2 text-sm rounded"></textarea>
                <input type="text" id="custPhone" placeholder="Mobile Number" required class="w-full border p-2 text-sm rounded">
                <input type="text" id="utr" placeholder="Enter UPI Transaction ID" required class="w-full border-2 border-blue-500 p-2 text-sm font-bold rounded"><button type="submit" class="w-full flipkart-orange text-white py-3 font-bold uppercase rounded-sm">Confirm Order</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // Your Config from Screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyCl8HeKsIUfqCTmNitXZIF_HvEkXCRIMHk",
            authDomain: "amasho-beb59.firebaseapp.com",
            projectId: "amasho-beb59",
            storageBucket: "amasho-beb59.firebasestorage.app",
            messagingSenderId: "66614392887",
            appId: "1:66614392887:web:a25043a44ae5d3310f67b2",
            databaseURL: "https://amasho-beb59-default-rtdb.firebaseio.com/" // Singapore Server
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.openCheckout = () => {
            document.getElementById('checkoutModal').classList.remove('hidden');
        };

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const orderData = {
                name: document.getElementById('custName').value,
                address: document.getElementById('custAddr').value,
                phone: document.getElementById('custPhone').value,
                utr: document.getElementById('utr').value,
                product: "Wooden Piggy Bank",
                amount: 100,
                time: new Date().toLocaleString()
            };
            
            try {
                await push(ref(db, 'orders'), orderData);
                alert("Order Placed Successfully!");
                location.reload();
            } catch (err) { alert("Error: " + err.message); }
        };
    </script>
</body>
</html>
